<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super VSP Store | Next-Gen General Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .nc-glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body x-data="store()" x-cloak>

    <!-- ADVANCED NAVBAR -->
    <nav class="nc-glass sticky top-0 z-[100] px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-200">
                <i data-lucide="zap" class="size-6 fill-current"></i>
            </div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter text-slate-900 leading-none">SUPER VSP</h1>
                <span class="text-[10px] font-bold text-indigo-600 tracking-widest uppercase">General Store</span>
            </div>
        </div>

        <div class="hidden lg:flex bg-slate-100/80 border border-slate-200 px-5 py-2.5 rounded-2xl w-1/3 items-center gap-3 transition-all focus-within:ring-2 focus-within:ring-indigo-500 focus-within:bg-white">
            <i data-lucide="search" class="text-slate-400 size-5"></i>
            <input type="text" placeholder="Search groceries, electronics, essentials..." class="bg-transparent outline-none w-full text-sm font-medium">
            <span class="text-[10px] bg-slate-200 px-1.5 py-0.5 rounded text-slate-500 font-bold">⌘K</span>
        </div>

        <div class="flex items-center gap-4">
            <button @click="cartOpen = true" class="relative group p-3 bg-slate-900 text-white rounded-2xl transition-all hover:bg-indigo-600 active:scale-95">
                <i data-lucide="shopping-basket" class="size-6"></i>
                <span x-show="cart.length > 0" x-text="cart.length" class="absolute -top-2 -right-2 bg-rose-500 text-[10px] font-bold w-6 h-6 flex items-center justify-center rounded-full border-4 border-white shadow-sm"></span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- HERO BENTO -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="md:col-span-2 bg-indigo-600 rounded-[3rem] p-10 md:p-16 text-white relative overflow-hidden group">
                <div class="relative z-10">
                    <span class="bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full text-xs font-bold mb-6 inline-block uppercase tracking-wider">Summer Refresh 2024</span>
                    <h2 class="text-5xl md:text-7xl font-extrabold mb-8 leading-[1.1] tracking-tight">Super Fresh.<br>Super <span class="text-indigo-200 underline decoration-indigo-400">Fast.</span></h2>
                    <button class="bg-white text-indigo-600 px-10 py-5 rounded-3xl font-extrabold text-lg hover:shadow-2xl transition-all active:scale-95">Explore Grocery</button>
                </div>
                <i data-lucide="shopping-cart" class="absolute right-[-5%] bottom-[-10%] size-96 opacity-10 -rotate-12 group-hover:rotate-0 transition-transform duration-700"></i>
            </div>
            <div class="bg-slate-900 rounded-[3rem] p-10 text-white flex flex-col justify-between overflow-hidden relative group">
                <div>
                    <h3 class="text-3xl font-bold mb-2">Tech Hub</h3>
                    <p class="text-slate-400 font-medium leading-relaxed">Upgrade your lifestyle with VSP Electronics.</p>
                </div>
                <button class="mt-8 flex items-center gap-2 font-bold text-indigo-400 group-hover:gap-4 transition-all">Browse Tech <i data-lucide="arrow-right"></i></button>
                <i data-lucide="cpu" class="absolute right-4 bottom-4 size-32 opacity-10"></i>
            </div>
        </div>

        <!-- CATEGORY FILTERS -->
        <div class="flex items-center gap-4 overflow-x-auto pb-8 no-scrollbar">
            <template x-for="cat in ['All Products', 'Fresh Grocery', 'Pantry', 'Electronics', 'Personal Care']">
                <button @click="filter = cat" 
                        :class="filter === cat ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-100' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-400'"
                        class="px-8 py-3.5 rounded-2xl border font-bold whitespace-nowrap transition-all text-sm" 
                        x-text="cat"></button>
            </template>
        </div>

        <!-- DYNAMIC PRODUCT GRID -->
        <div class="bento-grid">
            <template x-for="product in filteredProducts()" :key="product.id">
                <div class="product-card bg-white p-6 rounded-[2.5rem] border border-slate-100 flex flex-col group">
                    <div class="relative aspect-square rounded-[2rem] overflow-hidden bg-slate-50 mb-6">
                        <img :src="product.image" class="w-full h-full object-cover mix-blend-multiply group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter text-indigo-600" x-text="product.category"></div>
                    </div>
                    <h4 class="text-lg font-bold text-slate-800 mb-1" x-text="product.name"></h4>
                    <p class="text-slate-400 text-sm font-medium mb-6 flex-1">Premium Quality Guaranteed</p>
                    <div class="flex items-center justify-between mt-auto">
                        <span class="text-2xl font-black text-slate-900" x-text="'$' + product.price"></span>
                        <button @click="addToCart(product)" class="bg-slate-100 p-4 rounded-2xl text-slate-900 hover:bg-indigo-600 hover:text-white transition-all active:scale-90">
                            <i data-lucide="plus" class="size-6"></i>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- NC SLIDE-OUT CART -->
    <div x-show="cartOpen" class="fixed inset-0 z-[200]" x-transition>
        <div @click="cartOpen = false" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl p-8 flex flex-col" 
             x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
            
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black tracking-tight italic">YOUR BASKET</h2>
                <button @click="cartOpen = false" class="p-3 hover:bg-slate-100 rounded-2xl transition-colors"><i data-lucide="x"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto space-y-6 pr-2">
                <template x-if="cart.length === 0">
                    <div class="h-full flex flex-col items-center justify-center text-slate-300">
                        <i data-lucide="shopping-bag" class="size-20 mb-4 opacity-20"></i>
                        <p class="font-bold">Your basket is empty</p>
                    </div>
                </template>
                <template x-for="item in cart" :key="item.id">
                    <div class="flex gap-5 items-center animate-in slide-in-from-right duration-300">
                        <img :src="item.image" class="size-20 rounded-2xl object-cover bg-slate-50">
                        <div class="flex-1">
                            <h5 class="font-bold text-slate-800" x-text="item.name"></h5>
                            <p class="text-sm font-bold text-indigo-600" x-text="'$' + item.price"></p>
                        </div>
                        <button @click="removeFromCart(item.id)" class="text-rose-500 p-2 hover:bg-rose-50 rounded-xl transition-colors"><i data-lucide="trash-2" class="size-5"></i></button>
                    </div>
                </template>
            </div>

            <div class="border-t border-slate-100 pt-8 mt-6">
                <div class="flex justify-between items-end mb-8">
                    <span class="text-slate-400 font-bold uppercase tracking-widest text-xs">Total Amount</span>
                    <span class="text-4xl font-black text-slate-900" x-text="'$' + total.toFixed(2)"></span>
                </div>
                <button class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-extrabold text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all transform active:scale-95">
                    Secure Checkout
                </button>
            </div>
        </div>
    </div>

    <script>
        function store() {
            return {
                cartOpen: false,
                filter: 'All Products',
                cart: [],
                total: 0,
                products: [
                    { id: 1, name: 'Organic Red Strawberries', price: 6.50, category: 'Fresh Grocery', image: 'https://images.unsplash.com/photo-1464965911861-746a04b4bca6?w=400' },
                    { id: 2, name: 'Premium Arabica Coffee', price: 18.99, category: 'Pantry', image: 'https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=400' },
                    { id: 3, name: 'Smart VSP Watch Gen-2', price: 249.00, category: 'Electronics', image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400' },
                    { id: 4, name: 'Fresh Hass Avocados', price: 4.99, category: 'Fresh Grocery', image: 'https://images.unsplash.com/photo-1523049673857-eb18f1d7b578?w=400' },
                    { id: 5, name: 'Wireless Noise Cancel Pods', price: 129.00, category: 'Electronics', image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400' },
                    { id: 6, name: 'Gluten-Free Almond Granola', price: 12.50, category: 'Pantry', image: 'https://images.unsplash.com/photo-1517093157656-b99917c6470c?w=400' },
                    { id: 7, name: 'Luxury Scented Candle', price: 35.00, category: 'Personal Care', image: 'https://images.unsplash.com/photo-1603006905003-be475563bc59?w=400' },
                    { id: 8, name: 'High-Fiber Oat Milk', price: 5.50, category: 'Fresh Grocery', image: 'https://images.unsplash.com/photo-1550583724-125581cc3083?w=400' }
                ],
                filteredProducts() {
                    if (this.filter === 'All Products') return this.products;
                    return this.products.filter(p => p.category === this.filter);
                },
                addToCart(product) {
                    this.cart.push(product);
                    this.calculateTotal();
                },
                removeFromCart(id) {
                    const index = this.cart.findIndex(item => item.id === id);
                    if (index > -1) this.cart.splice(index, 1);
                    this.calculateTotal();
                },
                calculateTotal() {
                    this.total = this.cart.reduce((sum, item) => sum + item.price, 0);
                },
                init() {
                    lucide.createIcons();
                }
            }
        }
    </script>
</body>
</html>
